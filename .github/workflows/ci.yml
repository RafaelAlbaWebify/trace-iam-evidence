name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  backend:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backend
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check .
      - name: Type check
        run: python scripts/run_typecheck.py
      - name: Test
        run: python -m pytest -q --junitxml=test-results.xml
      - name: Upload backend proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-proof-${{ matrix.os }}
          path: |
            backend/mypy-results.txt
            backend/test-results.xml
          if-no-files-found: warn

  frontend:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package.json
      - name: Install frontend
        run: npm install --ignore-scripts
      - name: Type check
        run: npm run typecheck
      - name: Test
        run: npm test -- --reporter=junit --outputFile=test-results.xml
      - name: Build
        run: npm run build
      - name: Upload frontend proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-proof-${{ matrix.os }}
          path: |
            frontend/test-results.xml
            frontend/dist
          if-no-files-found: warn

  release-publisher-proof:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test self-locating release publisher
        shell: pwsh
        run: ./scripts/test_publish_release_candidate.ps1

  runtime-lifecycle-proof:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Test full local runtime lifecycle
        shell: pwsh
        run: ./scripts/test_trace_runtime.ps1

  portable-review-proof:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Test portable review ZIP safety, integrity and repeatability
        shell: pwsh
        run: ./scripts/test_export_portable_review.ps1

  browser-proof:
    runs-on: ubuntu-latest
    needs: [backend, frontend, release-publisher-proof, runtime-lifecycle-proof, portable-review-proof]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package.json
      - name: Install application
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "backend[dev]"
          npm --prefix frontend install --ignore-scripts
          npx --prefix frontend playwright install --with-deps chromium
      - name: Start backend and frontend
        run: |
          python -m uvicorn trace_iam.main:app --host 127.0.0.1 --port 8000 > backend.log 2>&1 &
          npm --prefix frontend run dev -- --host 127.0.0.1 --port 4173 > frontend.log 2>&1 &
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/api/health > /dev/null && curl --fail --silent http://127.0.0.1:4173 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Application services did not become ready"
          exit 1
      - name: Browser acceptance test
        run: npm --prefix frontend run e2e
      - name: Upload browser proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trace-browser-proof
          path: |
            frontend/e2e-artifacts
            frontend/playwright-report
            frontend/test-results
            backend.log
            frontend.log
          if-no-files-found: warn
