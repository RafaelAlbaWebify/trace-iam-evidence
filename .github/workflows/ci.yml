name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backend
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check .
      - name: Type check
        run: python -m mypy src
      - name: Test
        run: python -m pytest -q --junitxml=test-results.xml
      - name: Upload backend proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-proof-${{ matrix.os }}
          path: backend/test-results.xml
          if-no-files-found: warn

  frontend:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package.json
      - name: Install frontend
        run: npm install --ignore-scripts
      - name: Type check
        run: npm run typecheck
      - name: Test
        run: npm test -- --reporter=junit --outputFile=test-results.xml
      - name: Build
        run: npm run build
      - name: Upload frontend proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-proof-${{ matrix.os }}
          path: |
            frontend/test-results.xml
            frontend/dist
          if-no-files-found: warn
