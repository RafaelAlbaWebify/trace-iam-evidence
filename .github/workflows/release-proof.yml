name: Release proof

on:
  pull_request:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release-candidate:
    name: release-candidate-review (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package.json
      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "backend[dev]"
          npm --prefix frontend install --ignore-scripts
      - name: Verify release builder
        working-directory: backend
        run: python -m pytest tests/test_release_proof.py -q
      - name: Build public-safe release proof
        working-directory: backend
        run: >-
          python scripts/build_release_pack.py
          --scenarios ../examples/scenarios
          --output ../release-proof/${{ matrix.os }}
      - name: Build portfolio frontend
        run: npm --prefix frontend run build
      - name: Record controlled platform review
        run: >-
          python -c "from pathlib import Path;
          Path('release-proof/${{ matrix.os }}/platform-review.txt').write_text(
          'Controlled TRACE release-candidate build completed on ${{ matrix.os }}.\n',
          encoding='utf-8')"
      - name: Upload release proof
        uses: actions/upload-artifact@v4
        with:
          name: trace-release-proof-${{ matrix.os }}
          path: |
            release-proof/${{ matrix.os }}
            examples/scenarios
            frontend/dist
            README.md
            CHANGELOG.md
            docs/architecture-diagram.md
            docs/setup-and-demo.md
            docs/known-limitations.md
          if-no-files-found: error
